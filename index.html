<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokey Pô</title>
</head>

<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        background-image: url(https://picsum.photos/1920/1080);

    }

    main {
        width: 350px;
        height: 350px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: auto;
        margin-top: 18%;
        background: white;
    }
    h1 {
        margin-bottom: 30px;
    }
    button {
        width: 80px;
        height: 80px;
        font-size: 50px;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        transition: opacity 0.7s;
    }
    button:hover {
        opacity: 0.6;
    }
    .rock {
        background-color: #a200ff;
    }
    .paper {
        background-color: #9ee01a;
    }
    .scissors {
        background-color: #7dbeed;
    }
    p {
        font-size: 30px;
        margin-top: 20px;
    }
    .human-score {
        color: red;
    }
    .machine-score {
        color: blue;
    }
    .result {
        color: green;
    }

</style>

<body>
    <main>
        <h1>JokenPow</h1>

        <div>
            <button class="rock" onclick="playHuman('rock')">&#128074;&#127996;</button>
            <button class="paper" onclick="playHuman('paper')">&#128400;&#127996;</button>
            <button class="scissors" onclick="playHuman('scissors')">&#9996;&#127996;</button>
        </div>
        <p class="result"></p>
        <p>Sua Pontuação: <span class="human-score">0</span></p>
        <p>Pontuação da Alexa: <span class="machine-score">0</span></p>
    </main>
</body>
<SCript src="./script.js"></SCript>
</html>
